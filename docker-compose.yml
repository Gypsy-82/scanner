services:
  scanner:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: scanner
    restart: unless-stopped

    # ── Port: loopback-only — nginx on the host proxies here ──
    # The scanner is NEVER directly reachable from the internet.
    # Change 8080 to any unpredictable port you choose.
    ports:
      - "127.0.0.1:8080:80"

    # ── Volumes ────────────────────────────────────────────────
    # config.php: generated by setup.php on host, mounted read-only
    # rate_limits.json: writable — login rate limiting state
    # logs/: writable — error and access logs
    # clamav_db: named volume — ClamAV definitions persist across restarts
    volumes:
      - /opt/scanner/config.php:/var/www/scanner/config.php:ro
      - /opt/scanner/rate_limits.json:/var/www/scanner/rate_limits.json:rw
      - /opt/scanner/logs:/var/www/scanner/logs:rw
      - clamav_db:/var/lib/clamav:rw

    # ── Read-only root filesystem ──────────────────────────────
    # Container's own filesystem is immutable — no persistence.
    # Only the explicitly mounted volumes above are writable.
    read_only: true

    # ── tmpfs mounts (writable RAM disks for runtime state) ────
    # /tmp: upload temp files, pdfid working files
    # /tmp/php_sessions: PHP session files (session-only by design)
    # /var/lock/apache2, /var/run/apache2: Apache runtime state
    tmpfs:
      - /tmp:size=256m,mode=01777
      - /var/lock/apache2:size=1m,mode=0755
      - /var/run/apache2:size=4m,mode=0755

    # ── Minimal Linux capabilities ─────────────────────────────
    # Drop everything. Add back only what Apache needs to
    # bind port 80 and drop from root to www-data.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
      - NET_BIND_SERVICE

    # ── No privilege escalation inside container ───────────────
    security_opt:
      - no-new-privileges:true

    # ── Resource limits ────────────────────────────────────────
    # Prevents a runaway scan from starving other VPS services.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
    mem_limit: 512m
    memswap_limit: 512m
    cpus: '1.0'

    ulimits:
      nofile:
        soft: 1024
        hard: 2048
      nproc:
        soft: 64
        hard: 128

    # ── DNS: public resolvers only ─────────────────────────────
    # Scanner resolves DNS via Google/Cloudflare, never through
    # the host's resolver. This prevents it from resolving
    # internal VPS hostnames (e.g., db.internal, redis.local).
    dns:
      - 8.8.8.8
      - 1.1.1.1

    # ── No access to Docker socket ─────────────────────────────
    # Never mount /var/run/docker.sock into the scanner.

    # ── Isolated network ───────────────────────────────────────
    # Scanner lives on scanner_net (172.30.0.0/24), completely
    # separate from other app containers and the default bridge.
    # iptables rules in docker/isolate.sh block it from reaching
    # other private subnets.
    networks:
      - scanner_net

# ── Network definition ─────────────────────────────────────────
# Dedicated subnet keeps scanner traffic on its own bridge.
# The isolate.sh script adds iptables rules to block this subnet
# from reaching other Docker networks and host services.
networks:
  scanner_net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-scanner
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24

# ── Named volumes ──────────────────────────────────────────────
volumes:
  clamav_db:
    driver: local
