# ============================================================
#  Nginx reverse proxy — place in /etc/nginx/sites-available/
#  Enable: ln -s /etc/nginx/sites-available/scanner.conf \
#                /etc/nginx/sites-enabled/scanner.conf
#
#  This sits in front of the Docker container.
#  SSL terminates here. Container only sees HTTP on loopback.
#  Replace scanner.yourdomain.com with your actual subdomain.
# ============================================================

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name scanner.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name scanner.yourdomain.com;

    # ── SSL (Let's Encrypt via certbot) ───────────────────────
    ssl_certificate     /etc/letsencrypt/live/scanner.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/scanner.yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/scanner.yourdomain.com/chain.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:scanner_ssl:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── HSTS (2 years) ────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security headers ──────────────────────────────────────
    # These stack on top of headers the PHP app sets.
    add_header X-Frame-Options           "DENY" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "no-referrer" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

    # Strip server identity
    server_tokens off;
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # ── Rate limiting ─────────────────────────────────────────
    # 20 requests/minute per IP for login page (belt+suspenders
    # on top of the PHP rate limiter inside the container).
    limit_req_zone $binary_remote_addr zone=scanner_login:1m rate=5r/m;

    location = /login {
        limit_req zone=scanner_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Proxy everything else to container ────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Timeouts — scanner operations can take up to 2 minutes
        proxy_connect_timeout 10s;
        proxy_send_timeout    150s;
        proxy_read_timeout    150s;

        # Upload size (file scan)
        client_max_body_size 26M;

        # No caching — scanner responses are always fresh
        proxy_no_cache       1;
        proxy_cache_bypass   1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ── Block .git, .env, dotfiles at nginx level ─────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Access logs ───────────────────────────────────────────
    access_log /var/log/nginx/scanner-access.log;
    error_log  /var/log/nginx/scanner-error.log warn;
}
