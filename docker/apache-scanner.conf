# ── Scanner Apache VirtualHost ─────────────────────────────────
# Traffic arrives here from the host nginx reverse proxy (HTTP).
# SSL is terminated by nginx on the host — not needed inside container.
<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/scanner/public_html

    # ── PHP filesystem lockdown ────────────────────────────────
    # open_basedir prevents PHP from reading ANY file outside these paths.
    # /tmp is for upload temp files and pdfid working dir.
    # /opt/pdfid is read-only — pdfid.py script location.
    # /usr/bin and /usr/local/bin are needed for exec(clamscan/python3).
    php_admin_value open_basedir       /var/www/scanner:/tmp:/opt/pdfid
    php_admin_flag  allow_url_fopen    Off
    php_admin_flag  allow_url_include  Off
    php_admin_value upload_tmp_dir     /tmp/scanner_uploads
    php_admin_value upload_max_filesize 25M
    php_admin_value post_max_size      27M
    php_admin_value max_execution_time 120
    php_admin_value memory_limit       256M

    # ── Webroot permissions ────────────────────────────────────
    <Directory /var/www/scanner/public_html>
        Options -Indexes -FollowSymLinks -Includes -MultiViews
        AllowOverride All
        Require all granted
    </Directory>

    # ── Block ALL direct HTTP access to API handlers ───────────
    # Handlers are loaded via PHP require from index.php only.
    # Belt+suspenders on top of the session-token routing.
    <Directory /var/www/scanner/public_html/api>
        Require all denied
    </Directory>

    # ── Block config.php if somehow inside webroot ─────────────
    <FilesMatch "^(config|setup)\.php$">
        Require all denied
    </FilesMatch>

    # ── Block backup/editor/temp files ────────────────────────
    <FilesMatch "\.(bak|old|orig|save|swp|tmp|~)$">
        Require all denied
    </FilesMatch>

    # ── Logs go to the bind-mounted logs volume ────────────────
    ErrorLog  /var/www/scanner/logs/error.log
    CustomLog /var/www/scanner/logs/access.log combined
    LogLevel warn

    # ── Disable TRACE at vhost level (belt+suspenders) ────────
    TraceEnable Off
</VirtualHost>
