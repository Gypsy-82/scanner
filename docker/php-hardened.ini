; ── Security ──────────────────────────────────────────────────
expose_php             = Off
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /var/www/scanner/logs/php-error.log
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Never reveal install path or PHP internals in error output
html_errors            = Off

; ── Dangerous functions ────────────────────────────────────────
; exec() is kept — scanner uses it for clamscan and pdfid.py.
; All other shell execution functions are disabled.
disable_functions      = shell_exec,system,passthru,popen,proc_open,pcntl_exec,\
                         dl,putenv,parse_ini_file,show_source,\
                         php_uname,phpinfo,posix_kill,posix_setuid,posix_setgid

; ── File access ────────────────────────────────────────────────
; open_basedir set per-vhost in apache-scanner.conf (more specific).
allow_url_fopen        = Off
allow_url_include      = Off

; ── Upload limits ──────────────────────────────────────────────
file_uploads           = On
upload_max_filesize    = 25M
post_max_size          = 27M
upload_tmp_dir         = /tmp/scanner_uploads
max_file_uploads       = 1

; ── Session hardening ──────────────────────────────────────────
session.save_path          = /tmp/php_sessions
session.cookie_httponly    = 1
session.cookie_secure      = 1
session.cookie_samesite    = Strict
session.use_strict_mode    = 1
session.use_only_cookies   = 1
session.use_trans_sid      = 0
session.gc_probability     = 1
session.gc_divisor         = 100
session.gc_maxlifetime     = 7200
session.sid_length         = 48
session.sid_bits_per_character = 6

; ── Execution limits ───────────────────────────────────────────
max_execution_time         = 120
max_input_time             = 30
memory_limit               = 256M
max_input_vars             = 100

; ── OPcache ────────────────────────────────────────────────────
opcache.enable             = 1
opcache.memory_consumption = 64
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 1000
opcache.validate_timestamps = 0
opcache.revalidate_freq    = 0
